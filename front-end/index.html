<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="/front-end/css/login.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<div class="container">

    <div class="left">
        <h1>Bem Vindo <br> Gestão <br> 360</h1>
    </div>

    <div class="right">
        <br><br><br><br>
        <h2>LOGIN</h2>

        <div class="icon">👤</div>

        <input id="email" type="email" placeholder="Digite seu email">
        <input id="senha" type="password" placeholder="Digite sua senha">

        <div class="links">
            <a href="../front-end/pages/">Esqueceu sua senha?</a>
        </div>

        <button id="btnLogin">Acessar</button>

    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => { // garante que os elementos existem
  document.getElementById("btnLogin").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value.trim();

      if (!email || !senha) {
          Swal.fire({
              icon: 'error',
              title: 'Campos obrigatórios',
              text: 'Preencha todos os campos.'
          });
          return;
      }

      try {
          const res = await fetch("http://localhost:3000/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              // Se você não estiver usando cookies no backend, pode r  emover credentials
              body: JSON.stringify({ email, senha })
          });

          const data = await res.json();
          const usuario = localStorage.setItem('usuario', JSON.stringify(data))

          if (res.ok) {
              Swal.fire({
                  icon: 'success',
                  title: 'Login realizado!',
                  text: 'Você entrou no sistema com sucesso.',
                  timer: 2000,
                  showConfirmButton: false
              }).then(() => {
                  window.location.href = "../front-end/pages/home.html";
              });
          } else {
              Swal.fire({
                  icon: 'error',
                  title: 'Erro no login',
                  text: data.erro || "Erro desconhecido"
              });
          }

      } catch (err) {
          Swal.fire({
              icon: 'error',
              title: 'Erro de conexão',
              text: 'Não foi possível conectar ao servidor.'
          });
          console.error(err);
      }
  });
});
</script>
