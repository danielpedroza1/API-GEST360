<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Esqueceu a senha</title>
  <link rel="stylesheet" href="/front-end/css/esquesenha.css">
</head>

<body>

<div class="container">

  <div class="card">
    <h2>Esqueceu a senha?</h2>

    <label>Email</label>
    <input id="email" type="email" placeholder="Digite seu email">

    <label>Código da empresa</label>
    <input id="codigo" type="text" placeholder="Código de verificação">

    <label>Nova senha</label>
    <input id="novaSenha" type="password">

    <label>Confirmar senha</label>
    <input id="confirmarSenha" type="password">

    <button id="btnEnviar">Enviar</button>

    <p id="msg"></p>

    <a href="/index.html">Voltar para o login</a>
  </div>

</div>

<script>

document.getElementById("btnEnviar").addEventListener("click", async () => {

  const email = document.getElementById("email").value;
  const codigo = document.getElementById("codigo").value;
  const novaSenha = document.getElementById("novaSenha").value;
  const confirmarSenha = document.getElementById("confirmarSenha").value;
  const msg = document.getElementById("msg");

  msg.innerText = "";

  // 🔒 validar senha
  if (novaSenha !== confirmarSenha) {
    msg.style.color = "red";
    msg.innerText = "Senhas não coincidem";
    return;
  }

  try {

    // 🔥 1 - validar código
    const validar = await fetch("http://localhost:3000/auth/esqueci-senha", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        codigo_empresa: codigo
      })
    });

    const dataValidar = await validar.json();

    if (!validar.ok) {
      msg.style.color = "red";
      msg.innerText = dataValidar.erro;
      return;
    }

    // 🔥 2 - resetar senha
    const resetar = await fetch("http://localhost:3000/auth/resetar-senha", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        novaSenha
      })
    });

    const dataReset = await resetar.json();

    if (resetar.ok) {
      msg.style.color = "green";
      msg.innerText = "Senha alterada com sucesso!";

      setTimeout(() => {
        window.location.href = "/index.html";
      }, 1500);

    } else {
      msg.style.color = "red";
      msg.innerText = dataReset.erro;
    }

  } catch (err) {
    msg.innerText = "Erro ao conectar com servidor";
  }

});

</script>

</body>
</html>
