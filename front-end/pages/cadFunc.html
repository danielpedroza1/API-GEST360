<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro - Gestão 360</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/front-end/css/cadFunc.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<div class="container">

    <div class="card">
       <div class="header">
        <i class="fas fa-arrow-left" onclick="history.back()"></i>
        </div>
        <h2>CADASTRO DE FUNCIONÁRIO</h2>

        <div class="conteudo">

            <div class="formulario">

                <label>Nome completo</label>
                <input id="nome" type="text" placeholder="Digite seu nome completo">

                <label>Email</label>
                <input id="email" type="email" placeholder="seu@email.com">

                <label>Senha</label>
                <input id="senha" type="password" placeholder="Senha">

                <select id="tipo">
                    <option value="">Escolha uma categoria</option>
                    <option value="funcionario">Funcionário</option>
                    <option value="admin">Admin</option> 
                </select>

            </div>

        </div>

        <button id="salvar">Cadastrar</button>

    </div>

</div>

<script>

// 🔥 verificar se é admin (CORRIGIDO)
const usuario = JSON.parse(localStorage.getItem("usuario"));

if (!usuario || usuario.usuario.tipo !== "admin") {
    Swal.fire({
        icon: 'error',
        title: 'Acesso negado',
        text: 'Apenas administradores podem acessar esta página.',
        timer: 3000,
        showConfirmButton: false
    }).then(() => {
        window.location.href = "/front-end/pages/home.html";
    });
}

// 🔥 cadastrar usuário
document.getElementById("salvar").addEventListener("click", async () => {

    const nome = document.getElementById("nome").value.trim();
    const email = document.getElementById("email").value.trim();
    const senha = document.getElementById("senha").value.trim();
    const tipo = document.getElementById("tipo").value;

    // 🔥 validação
    if (!nome || !email || !senha || !tipo) {
        Swal.fire({
            icon: 'error',
            title: 'Campos obrigatórios',
            text: 'Preencha todos os campos.'
        });
        return;
    }

    try {

        const res = await fetch("http://localhost:3000/usuarios", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                nome,
                email,
                senha,
                tipo
            })
        });

        const data = await res.json();

        if (res.ok) {
            Swal.fire({
                icon: 'success',
                title: 'Funcionário cadastrado!',
                text: 'O usuário foi criado com sucesso.',
                timer: 2000,
                showConfirmButton: false
            }).then(() => {
                // limpa campos
                document.getElementById("nome").value = "";
                document.getElementById("email").value = "";
                document.getElementById("senha").value = "";
                document.getElementById("tipo").value = "";
                window.location.href = "/front-end/pages/home.html";
            });

        } else {
            Swal.fire({
                icon: 'error',
                title: 'Erro ao cadastrar',
                text: data.erro || "Erro ao cadastrar funcionário"
            });
        }

    } catch (erro) {
        Swal.fire({
            icon: 'error',
            title: 'Erro de conexão',
            text: 'Não foi possível conectar ao servidor.'
        });
    }

});

</script>

</body>

</html>
