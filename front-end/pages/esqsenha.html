<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esqueci a Senha</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#4e73df,#1cc88a);
}

.container{
    background:#fff;
    padding:30px;
    border-radius:12px;
    width:350px;
    box-shadow:0 4px 20px rgba(0,0,0,0.2);
    text-align:center;
}

.container h2{
    margin-bottom:15px;
}

.container p{
    font-size:14px;
    color:#555;
    margin-bottom:20px;
}

.input-group{
    position:relative;
    margin-bottom:20px;
}

.input-group i{
    position:absolute;
    left:10px;
    top:50%;
    transform:translateY(-50%);
    color:#999;
}

.input-group input{
    width:100%;
    padding:10px 10px 10px 35px;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#4e73df;
    color:#fff;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#2e59d9;
}

.msg{
    margin-top:15px;
    font-size:14px;
}
.sucesso{
    color:green;
}
.erro{
    color:red;
}

.voltar{
    margin-top:15px;
    display:block;
    font-size:14px;
    text-decoration:none;
    color:#4e73df;
}
</style>

</head>

<body>

<div class="container">
    <h2>Esqueceu a senha?</h2>
    <p>Digite seu e-mail e enviaremos um link para redefinir sua senha.</p>

    <form id="formRecuperar">
        <div class="input-group">
            <i class="fa fa-envelope"></i>
            <input type="email" id="email" placeholder="Digite seu e-mail" required>
        </div>

        <button type="submit">Enviar</button>
    </form>

    <div class="msg" id="mensagem"></div>

    <a href="login.html" class="voltar">Voltar ao login</a>
</div>

<script>
const form = document.getElementById("formRecuperar");
const mensagem = document.getElementById("mensagem");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value;

    try {
        const resposta = await fetch("http://localhost:3000/esqueci-senha", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email })
        });

        const data = await resposta.json();

        if(resposta.ok){
            mensagem.textContent = "Email enviado com sucesso!";
            mensagem.className = "msg sucesso";
        } else {
            mensagem.textContent = data.erro || "Erro ao enviar email";
            mensagem.className = "msg erro";
        }

    } catch (erro) {
        mensagem.textContent = "Erro ao conectar com o servidor";
        mensagem.className = "msg erro";
    }
});
</script>

</body>
</html>
